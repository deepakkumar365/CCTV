<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGMS School Live CCTV Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(15, 23, 42, 0.8);
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --error-color: #ef4444;
            --online-color: #22c55e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at 50% 0%, #1e293b, transparent);
        }

        header {
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            font-weight: 600;
            font-size: 1.5rem;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 12px;
            flex-grow: 1;
        }

        .camera-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16 / 9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, border-color 0.2s;
        }

        .camera-card:hover {
            border-color: var(--accent-color);
            transform: scale(1.02);
            z-index: 10;
        }

        .video-wrapper {
            width: 100%;
            height: 100%;
            background: #000;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .camera-label {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            z-index: 5;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-indicator {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--error-color);
            box-shadow: 0 0 8px var(--error-color);
            z-index: 5;
        }

        .status-indicator.online {
            background: var(--online-color);
            box-shadow: 0 0 8px var(--online-color);
        }

        .error-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            z-index: 2;
            display: none;
        }

        /* Mobile Adjustments */
        @media (max-width: 1200px) {
            .grid-container { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 640px) {
            .grid-container { grid-template-columns: 1fr; }
            h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <header>
        <h1>SGMS School Live CCTV Dashboard</h1>
    </header>

    <div class="grid-container">
        {% for ch_id, ch_data in channels.items() %}
        <div class="camera-card" id="card-{{ ch_id }}">
            <div class="camera-label">{{ ch_data.name }}</div>
            <div class="status-indicator" id="status-{{ ch_id }}"></div>
            <div class="video-wrapper">
                <video id="video-{{ ch_id }}" muted playsinline></video>
                <div class="error-overlay" id="error-{{ ch_id }}">Signal Lost</div>
            </div>
        </div>
        {% endfor %}
    </div>

    <script>
        const channels = {{ channels | tojson }};
        const players = {};

        function initChannel(ch_id) {
            const video = document.getElementById(`video-${ch_id}`);
            const videoSrc = `/stream/${ch_id}/stream.m3u8`;
            const statusIndicator = document.getElementById(`status-${ch_id}`);
            const errorOverlay = document.getElementById(`error-${ch_id}`);

            if (Hls.isSupported()) {
                const hls = new Hls({
                    manifestLoadingMaxRetry: 10,
                    manifestLoadingRetryDelay: 2000,
                });
                hls.loadSource(videoSrc);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => {}); // Autoplay might be blocked without interaction
                    statusIndicator.classList.add('online');
                    errorOverlay.style.display = 'none';
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        statusIndicator.classList.remove('online');
                        errorOverlay.style.display = 'flex';
                        hls.startLoad();
                    }
                });

                players[ch_id] = hls;
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = videoSrc;
                video.addEventListener('loadedmetadata', () => {
                    video.play();
                    statusIndicator.classList.add('online');
                });
            }
        }

        // Initialize all channels
        Object.keys(channels).forEach(ch_id => {
            initChannel(ch_id);
        });

        // Periodic status check
        function checkStatus() {
            fetch('/status')
                .then(res => res.json())
                .then(data => {
                    Object.keys(data).forEach(ch_id => {
                        const statusIndicator = document.getElementById(`status-${ch_id}`);
                        const errorOverlay = document.getElementById(`error-${ch_id}`);
                        if (data[ch_id] === 'online') {
                            statusIndicator.classList.add('online');
                            errorOverlay.style.display = 'none';
                        } else {
                            statusIndicator.classList.remove('online');
                            errorOverlay.style.display = 'flex';
                        }
                    });
                });
        }

        setInterval(checkStatus, 10000);

        // Optional: Click to expand or focus (could be added later)
    </script>
</body>
</html>
